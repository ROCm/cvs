# CVS DTNI v2 config -- vLLM Llama-3.1-70B single-node inference.
#
# Pre-DTNI revert: workload YAML owns container, fabric, and topology shape.
# The cluster file is just "what hosts I can reach + how to log in"; GPU
# count is discovered at runtime via rocm-smi in the adapter's prepare().
#
# PR-Y barebones milestone (addendum §9 "G6 re-split"): SINGLE CELL.
# ``sweep`` declares one TP / one concurrency / one sequence combo so the
# expansion produces exactly one ``SweepCell``. PR-Z (matrix layer) lowers
# real swept values into the launch command (real C3); until then C3
# collapses to "adapter consumes the single configured TP value".
#
# C4 descoped (security removed, addendum §4 B7 / §5 C4): HF token rides
# in ``container.env`` and is recorded verbatim in pssh logs / manifest
# commands / container.log / docker inspect. Accepted on
# closed/internal clusters.
schema_version: "2"
framework: vllm
model: meta-llama/Llama-3.1-70B-Instruct
seed: 0

knobs:
  attention: aiter_unified
  quant: fp8
  backend: vllm

# Workload container: image + device passthrough + env.
container:
  image: rocm/vllm-dev:nightly
  device_list: [/dev/kfd, /dev/dri]
  env:
    HF_TOKEN: ${env:HF_TOKEN}
  shm_size: 16G
  ipc: host
  network: host

# Fabric: NCCL/UCX/Gloo knobs. Folded into container.env at launch via
# Fabric.to_env(); workload container.env wins on conflict. Single-node
# inference does not exercise inter-node NCCL but the HCA selection still
# affects intra-node GPU<->GPU collectives.
fabric:
  nic_type: thor2
  nccl_ib_hca: "bnxt_re0,bnxt_re1,bnxt_re2,bnxt_re3,bnxt_re4,bnxt_re5,bnxt_re6,bnxt_re7"
  nccl_socket_ifname: ens51f1np1
  nccl_ib_gid_index: "3"

# Single-role single-node inference: shorthand ``nnodes`` expands to
# ``{server: {count: nnodes}}``. Multi-role workloads use explicit
# ``roles: {name: {count}}`` (sglang-disagg: prefill+decode+router;
# megatron: master+worker).
topology: { nnodes: 1 }

# Single-cell barebones: one value per axis. The adapter validates
# ``tp <= discovered_gpu_count`` at prepare() time (no static
# gpus_per_node on the topology -- pre-DTNI revert).
sweep:
  tensor_parallelism: [8]
  concurrency: [16]
  sequence_combinations:
    - { isl: 1024, osl: 1024, name: single }

# ``params`` declares VALUES; the adapter composes ``vllm serve`` /
# ``vllm bench serve`` argv from them. server_script / bench_serv_script
# left unset -- adapter owns the CLI shape.
params:
  max_model_len: 9216
  gpu_memory_utilization: 0.9
  quantization: fp8
  backend: vllm
  dataset_name: random
  num_prompts: 3200
  request_rate: inf
  burstiness: 1.0
  tokenizer_mode: auto
  base_url: http://0.0.0.0
  port_no: 8888

# Placeholders to be calibrated from a baseline Llama-70B run.
thresholds:
  - { type: rate,       metric: total_throughput, op: ">=", value: 1200, unit: tok/s }
  - { type: percentile, metric: ttft_ms, percentile: 99, op: "<=", value: 200, unit: ms }
  - { type: percentile, metric: tpot_ms, percentile: 99, op: "<=", value: 30,  unit: ms }

benchmarks: [throughput, ttft_p99]
