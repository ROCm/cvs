# CVS DTNI v2 config -- vLLM Llama-3.1-70B single-node inference.
#
# Pre-DTNI shape: workload YAML owns container, fabric, and topology shape.
# The cluster file is just "what hosts I can reach + how to log in"; GPU
# count is discovered at runtime via rocm-smi in the adapter's prepare().
#
# Single-cell today: ``params`` declares scalars for tensor_parallelism /
# concurrency / isl / osl. The multi-cell sweep machinery exists in
# ``cvs/lib/config/sweep.py`` but is not yet wired into the conftest's
# cell-parametrize hook -- PR-Z lifts those four params to sweep axes.
#
# C4 descoped (security removed, addendum §4 B7 / §5 C4): HF token rides
# in ``container.env`` and is recorded verbatim in pssh logs / manifest
# commands / container.log / docker inspect. Accepted on
# closed/internal clusters.
framework: vllm
model: meta-llama/Llama-3.1-70B-Instruct
seed: 0

knobs:
  attention: aiter_unified

# Workload container: image + device passthrough + env.
container:
  image: rocm/vllm-dev:nightly
  device_list: [/dev/kfd, /dev/dri]
  env:
    HF_TOKEN: ${env:HF_TOKEN}
  shm_size: 16G
  ipc: host
  network: host

# Fabric: NCCL/UCX/Gloo knobs. Folded into container.env at launch via
# Fabric.to_env(); workload container.env wins on conflict.
fabric:
  nic_type: thor2
  nccl_ib_hca: "bnxt_re0,bnxt_re1,bnxt_re2,bnxt_re3,bnxt_re4,bnxt_re5,bnxt_re6,bnxt_re7"
  nccl_socket_ifname: ens51f1np1
  nccl_ib_gid_index: "3"

# Single-role single-node inference: shorthand expands to
# ``{server: {count: nnodes}}``. Multi-role workloads use the explicit
# ``roles: {name: {count}}`` form.
topology: { nnodes: 1 }

# ``params`` declares VALUES; the adapter composes ``vllm serve`` /
# ``vllm bench serve`` argv. server_script / bench_serv_script left
# unset -- adapter owns the CLI shape.
params:
  # Server-side typed knobs.
  max_model_len: 9216
  gpu_memory_utilization: 0.9
  quantization: fp8
  # Cell-shape scalars (PR-Z promotes to sweep axes).
  tensor_parallelism: 8
  concurrency: 16
  isl: 1024
  osl: 1024
  # Bench-side typed knobs. ``backend`` is the bench client's --backend
  # flag (which server API to speak: vllm | sglang | tgi | openai); since
  # we point at a vLLM server, this is always "vllm". ``dataset_name``
  # "random" generates synthetic prompts in-process via --random-*-len
  # (no external dataset); "sharegpt"/"hf"/"sonnet" pull real datasets
  # from HF Hub.
  backend: vllm
  dataset_name: random
  num_prompts: 3200
  request_rate: inf
  burstiness: 1.0
  tokenizer_mode: auto
  base_url: http://0.0.0.0
  port_no: 8888

# Placeholders to be calibrated from a baseline Llama-70B run.
thresholds:
  - { type: rate,       metric: total_throughput, op: ">=", value: 1200, unit: tok/s }
  - { type: percentile, metric: ttft_ms, percentile: 99, op: "<=", value: 200, unit: ms }
  - { type: percentile, metric: tpot_ms, percentile: 99, op: "<=", value: 30,  unit: ms }

benchmarks: [throughput, ttft_p99]
