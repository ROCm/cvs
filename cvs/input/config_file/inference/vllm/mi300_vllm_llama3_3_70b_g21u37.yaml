# Real-HW test config for g21u37 -- Llama-3.3-70B prefetched on /mnt/dtni/models.
# Pre-DTNI shape: workload owns container + fabric; cluster file is
# minimal. GPU count discovered at runtime via rocm-smi.
framework: vllm
model: meta-llama/Llama-3.3-70B-Instruct
seed: 0

knobs:
  attention: aiter_unified

container:
  image: rocm/utd-private:vllm-0.21.0-ubuntu24.04-py3.13-nightlies-device-all-cdna-rocm7.14.0a20260603-ad7125a43
  device_list: [/dev/kfd, /dev/dri]
  volume_dict:
    /mnt/dtni/models: /models
  env:
    HF_HUB_CACHE: /models
    HF_HOME: /tmp/hf_home
    HF_HUB_OFFLINE: "1"
    TRANSFORMERS_OFFLINE: "1"
    VLLM_USE_V1: "1"
  shm_size: 16G
  ipc: host
  network: host

# Core42 fabric: five 400G RoCE HCAs per node.
fabric:
  nic_type: ainic
  nccl_ib_hca: "rocep158s0,rocep159s0,rocep190s0,rocep206s0,rocep222s0"
  nccl_ib_gid_index: "3"

topology: { nnodes: 1 }

# Adapter composes ``vllm serve`` / ``vllm bench serve`` argv from these.
params:
  max_model_len: 9216
  gpu_memory_utilization: 0.9
  download_dir: /models
  tensor_parallelism: 8
  concurrency: 16
  isl: 1024
  osl: 1024
  backend: vllm
  dataset_name: random
  num_prompts: 128
  request_rate: inf
  burstiness: 1.0
  tokenizer_mode: auto
  base_url: http://0.0.0.0
  port_no: 8888

# Smoke-thresholds -- intentionally loose; the point of the test run is to
# exercise the spine end-to-end, not to grade Llama-3.3 perf.
thresholds:
  - { type: rate,       metric: total_throughput, op: ">=", value: 1,     unit: tok/s }
  - { type: percentile, metric: ttft_ms, percentile: 99, op: "<=", value: 60000, unit: ms }
  - { type: percentile, metric: tpot_ms, percentile: 99, op: "<=", value: 5000,  unit: ms }

benchmarks: [throughput, ttft_p99]
