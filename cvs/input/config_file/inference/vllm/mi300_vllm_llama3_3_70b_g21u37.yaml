# Real-HW test config for g21u37 -- Llama-3.3-70B prefetched on /mnt/dtni/models.
# Mirrors mi300_vllm_llama3_1_70b_single.yaml in shape (same B1-B4 ergonomic
# fixes applied), but uses the prefetched cluster model so the run does not
# depend on HF auth or a network fetch. HF_HUB_CACHE points at the cache
# directly; HF_HUB_OFFLINE keeps vllm from hitting the hub at all.
schema_version: "2"
framework: vllm
model: meta-llama/Llama-3.3-70B-Instruct
seed: 0

knobs:
  attention: aiter_unified
  backend: vllm

container:
  env:
    HF_HUB_CACHE: /models
    HF_HOME: /tmp/hf_home
    HF_HUB_OFFLINE: "1"
    TRANSFORMERS_OFFLINE: "1"
    VLLM_USE_V1: "1"
  volumes:
    /mnt/dtni/models: /models
  devices:
    - /dev/kfd
    - /dev/dri
  shm_size: 16G
  ipc: host
  network: host

# vLLM v1 serve launched directly; model + TP inlined because pre-G5b the
# adapter does not lower sweep.tensor_parallelism into command argv.
params:
  server_script: >-
    vllm serve meta-llama/Llama-3.3-70B-Instruct
    --tensor-parallel-size 8 --port 8888 --host 0.0.0.0
    --max-model-len 9216 --gpu-memory-utilization 0.9 --download-dir /models
  bench_serv_script: "-m vllm.entrypoints.cli.main bench serve"
  backend: vllm
  container_image: rocm/utd-private:vllm-0.21.0-ubuntu24.04-py3.13-nightlies-device-all-cdna-rocm7.14.0a20260603-ad7125a43
  dataset_name: random
  num_prompts: 128
  max_model_length: 9216
  request_rate: inf
  burstiness: 1.0
  tokenizer_mode: auto
  base_url: http://0.0.0.0
  port_no: 8888

topology: { nnodes: 1, gpus_per_node: 8, selector: mi300 }

sweep:
  tensor_parallelism: [8]
  concurrency: [16]
  sequence_combinations:
    - { isl: 1024, osl: 1024, name: single }

thresholds:
  - { type: rate,       metric: total_throughput, op: ">=", value: 1,     unit: tok/s }
  - { type: percentile, metric: ttft_ms, percentile: 99, op: "<=", value: 60000, unit: ms }
  - { type: percentile, metric: tpot_ms, percentile: 99, op: "<=", value: 5000,  unit: ms }

benchmarks: [throughput, ttft_p99]
