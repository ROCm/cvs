# Aorta Benchmark Test Configuration
# Parsing runs on the host (your venv) from torch_profiler artifacts. Container TraceLens
# analysis is optional; when enabled and available in the image, Excel reports are used
# first, otherwise host parses raw traces (TraceLens in venv or basic JSON parsing).

# Path to Aorta repository on shared filesystem (placeholder resolved from cluster config).
# If the directory does not exist, set aorta_auto_clone: true and aorta_clone_url to clone it.
aorta_path: /scratch/users/{user-id}/aorta
# aorta_auto_clone: false
# aorta_clone_url: "https://github.com/your-org/aorta.git"  # set when using auto-clone

# Container mount point for aorta_path
container_mount_path: /mnt

# Aorta base config file (relative to aorta_path)
# profile_overlap_2gpu.yaml has profiling enabled with compile disabled (works on ROCm)
base_config: config/profile_overlap_2gpu.yaml

# Docker container settings
docker:
  image: jeffdaily/pytorch:torchrec-dlrm-complete
  container_name: aorta-benchmark
  shm_size: 17G
  network_mode: host
  privileged: true

# RCCL build configuration
rccl:
  clone_url: https://github.com/rocm/rccl.git
  branch: develop
  build_path: /mnt/rccl

# NCCL/RCCL environment variables
environment:
  NCCL_MAX_NCHANNELS: 112
  NCCL_MAX_P2P_NCHANNELS: 112
  NCCL_DEBUG: VERSION
  TORCH_NCCL_HIGH_PRIORITY: 1
  OMP_NUM_THREADS: 1
  RCCL_MSCCL_ENABLE: 0

# Short test run (profile_overlap_2gpu.yaml already uses a short profile window)
training_overrides:
  training.max_steps: 15
  profiling.active: 6

# Scripts to execute (using existing Aorta scripts)
# build_script is skipped when skip_rccl_build is true
build_script: scripts/launch_rocm.sh
experiment_script: scripts/launch_rocm.sh

# Hardware
gpus_per_node: 8

# Timeout
timeout_seconds: 3600

# Skip RCCL build for benchmark runs with container-native RCCL
skip_rccl_build: true

# Post-benchmark analysis (optional; host parsing is primary)
# When true, runner tries to generate Excel reports inside the container. If TraceLens
# is not installed in the image, analysis is skipped and host parses raw traces.
analysis:
  enable_tracelens: false
  enable_gemm_analysis: false
  tracelens_script: scripts/tracelens_single_config/run_tracelens_single_config.sh
  gemm_script: scripts/gemm_analysis/run_tracelens_analysis.sh
  skip_if_exists: false

# Multi-node disaggregated launch.
#
# When the cluster file has more than one node entry, the runner launches a
# `torchrun` rank-group on every node in parallel (one per node), all
# rendezvous-ing on the head node. Mirrors aorta's own
# scripts/multi_node/local_launch.sh pattern, so a single cluster.json with N
# host entries is enough -- you no longer need N cluster files.
#
# `master_launch_mode: auto` keeps current single-node behavior (delegates to
# experiment_script) for 1-node clusters and switches to disaggregated
# torchrun for >1-node clusters. Force one or the other with `script` /
# `torchrun` if you want to override the auto-detection.
#
# When master_launch_mode resolves to torchrun, `experiment_script` is NOT
# used -- the runner builds:
#   torchrun --nnodes <N> --node_rank <R> --nproc_per_node <P>
#            --master_addr <head> --master_port <PORT>
#            <container_mount_path>/<train_script>
#            --config <container_mount_path>/<base_config>
#            [--override training_overrides...]
#
# extra_env is exported inside each container before torchrun -- use it for
# transport-specific knobs that depend on the cluster (NCCL_SOCKET_IFNAME,
# NCCL_IB_HCA, NCCL_IB_GID_INDEX, ...). On a single ethernet network you can
# usually leave it empty.
multi_node:
  master_launch_mode: auto
  # nproc_per_node: 8       # defaults to gpus_per_node
  # master_port: 29500      # default: pick a free ephemeral port
  # master_addr: 10.0.0.1   # default: head node from cluster.json
  train_script: train.py
  extra_torchrun_args: []
  extra_train_args: []
  extra_env: {}
  collect_traces: true

# Expected results: default thresholds for gfx942 (e.g. MI300). Change these as per your
# testing config (GPU, node count, workload); see docs/reference/configuration-files/aorta.rst.
# Tuned for host raw-trace parsing; use stricter values (e.g. min_compute_ratio 0.5+) with TraceLens Excel reports.
expected_results:
  max_avg_iteration_ms: 12000
  min_compute_ratio: 0.01   # host parsing often 1–10%; use 0.5+ for TraceLens/Excel metrics
  min_overlap_ratio: 0.0
  max_time_variance_ratio: 0.5
