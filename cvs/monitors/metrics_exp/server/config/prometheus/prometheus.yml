# Prometheus Configuration for AMD GPU Fleet Monitoring
global:
  scrape_interval: 30s      # 30s interval for scalability with 1000+ nodes
  evaluation_interval: 30s
  scrape_timeout: 25s       # Slightly longer timeout for GPU metrics

# Alerting configuration
alerting:
  alertmanagers: []

# Rule files
rule_files: []

# Scrape configs
scrape_configs:
  # Prometheus self-monitoring
  - job_name: 'prometheus'
    scrape_interval: 15s
    static_configs:
      - targets: ['localhost:9090']

  # Local GPU exporter (monitoring server's own GPUs, if present)
  # Uses localhost:5000 which works with both host-mode and bridge-mode networking
  - job_name: 'local_gpu_metrics'
    scrape_interval: 30s
    scrape_timeout: 25s
    static_configs:
      - targets: ['localhost:5000']
        labels:
          job: 'amd_gpu_metrics'
          node_group: 'monitoring-server'
          hostname: 'monitoring-server'
    relabel_configs:
      - source_labels: [__address__]
        target_label: instance
      - source_labels: [node_group]
        target_label: nodegroup
      - source_labels: [hostname]
        target_label: host

  # GPU metrics from AMD Device Metrics Exporter on remote nodes
  # Node groups are dynamically added via file-based service discovery
  - job_name: 'amd_gpu_metrics'
    scrape_timeout: 25s
    file_sd_configs:
      - files:
          - '/etc/prometheus/targets/gpu_*.json'
        refresh_interval: 30s
    relabel_configs:
      - source_labels: [__address__]
        target_label: instance
      - source_labels: [node_group]
        target_label: nodegroup
      - source_labels: [hostname]
        target_label: host

  # Node Exporter for CPU/System metrics
  - job_name: 'node_exporter'
    scrape_interval: 15s
    file_sd_configs:
      - files:
          - '/etc/prometheus/targets/node_*.json'
        refresh_interval: 30s
    relabel_configs:
      - source_labels: [__address__]
        target_label: instance
      - source_labels: [node_group]
        target_label: nodegroup
      - source_labels: [hostname]
        target_label: host

  # RDMA Exporter for network metrics
  - job_name: 'rdma_metrics'
    scrape_interval: 15s
    scrape_timeout: 10s
    file_sd_configs:
      - files:
          - '/etc/prometheus/targets/rdma_*.json'
        refresh_interval: 30s
    relabel_configs:
      - source_labels: [__address__]
        target_label: instance
      - source_labels: [node_group]
        target_label: nodegroup
      - source_labels: [hostname]
        target_label: host
