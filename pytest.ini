[pytest]

addopts = -p no:warnings
log_cli=true
log_file_level = info
log_format = %(asctime)s %(levelname)s %(message)s
log_date_format = %Y-%m-%d %H:%M:%S

# Filter non-fatal warnings from Docker SDK SSH cleanup
filterwarnings =
    ignore::pytest.PytestUnraisableExceptionWarning
    ignore:.*Broken pipe.*:BrokenPipeError

# Custom markers used by the multi-orch RVS health suite. Also registered at
# runtime in cvs/tests/health/conftest.py via addinivalue_line; this static
# declaration makes them visible to `pytest --markers` and avoids the
# PytestUnknownMarkWarning when the conftest is not yet loaded (e.g., during
# `pytest --collect-only` from outside cvs/tests/health/).
markers =
    requires_rvs(min_version=None, max_version=None): Skip if cluster RVS version is outside [min_version, max_version)
    requires_multinode: Skip if cluster has fewer than 2 nodes
